<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoBooth QR Backend</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff8ed;
      color: #442d3a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    main {
      width: min(640px, 100%);
      background: #fffefa;
      border: 3px solid #f5d96a;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 16px 50px rgba(68, 45, 58, 0.16);
    }
    h1 { margin: 0 0 10px; font-size: 40px; line-height: 1; letter-spacing: 0; }
    p { margin: 0; line-height: 1.6; }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    code,
    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(201, 46, 88, 0.22);
      color: #442d3a;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>PhotoBooth QR Backend</h1>
    <p>這個服務負責接收拍貼成品、保存到 Vercel Blob，並回傳可掃描的分享連結與 QR SVG。</p>
    <div class="links">
      <code>GET /health</code>
      <a href="/admin">管理後台</a>
    </div>
  </main>
</body>
</html>
